name: Test Report

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  test-report:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion != 'skipped'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Generate detailed test report
      run: |
        pytest tests/ -v --tb=short --html=report.html --self-contained-html || true
        pytest tests/ -v --tb=short --json-report --json-report-file=report.json || true
    
    - name: Upload test report
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: |
          report.html
          report.json
    
    - name: Comment PR
      if: github.event.workflow_run.event == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('report.json', 'utf8'));
          
          const summary = report.summary || {};
          const passed = summary.passed || 0;
          const failed = summary.failed || 0;
          const skipped = summary.skipped || 0;
          const total = summary.total || 0;
          
          const body = `## 🦀 CrabSwarm Test Report
          
          | Status | Count |
          |--------|-------|
          | ✅ Passed | ${passed} |
          | ❌ Failed | ${failed} |
          | ⏭️ Skipped | ${skipped} |
          | **Total** | **${total}** |
          
          ${failed > 0 ? '⚠️ Some tests failed. Please check the detailed report.' : '✅ All tests passed!'}
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
