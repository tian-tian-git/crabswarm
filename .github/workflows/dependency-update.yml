name: Dependency Update

on:
  schedule:
    # 每周一早上8点运行
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  # ==========================================
  # 1. 检查依赖更新
  # ==========================================
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools

      - name: Check CrabSwarm dependencies
        working-directory: ./crabswarm
        run: |
          pip-compile setup.py --upgrade --output-file requirements.txt || true

      - name: Create update report
        run: |
          echo "# Dependency Update Report" > dependency-report.md
          echo "Date: $(date)" >> dependency-report.md
          echo "" >> dependency-report.md
          echo "## CrabSwarm Dependencies" >> dependency-report.md
          if [ -f crabswarm/requirements.txt ]; then
            cat crabswarm/requirements.txt >> dependency-report.md
          fi

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: dependency-report.md
