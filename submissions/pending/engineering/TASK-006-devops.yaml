## 配置亮点

1. **多 Python 版本支持**: 3.10, 3.11, 3.12
2. **缓存优化**: pip 缓存加速构建
3. **并行测试**: lint/test/build 并行执行
4. **安全扫描**: Bandit 自动安全检测
5. **覆盖率报告**: HTML 和 XML 格式
6. **产物管理**: 自动上传构建产物

